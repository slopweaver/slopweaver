# Slopweaver eval harness (v0.2).
# Each labelled question runs end to end through promptfoo via the ask provider, which shells the real
# `slopweaver ask --json` against the local world model. The grounding assertion (cases.ts →
# groundingAssertion.ts) scores each result against a hand-labelled, frozen expected-grounding set WE
# own — deterministic, no LLM on the gate. It reports the two-layer metric: retrieval recall (did the
# expected records reach the slice) vs answer recall + citation precision (did the answer cite them).
description: Slopweaver ask harness (v0.2)

prompts:
  - '{{question}}'

providers:
  - id: file://./askProvider.ts
    label: ask@working-tree

tests: file://./cases.ts
