name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - run: corepack enable
      - run: yarn install --immutable
      - name: Typecheck
        run: yarn typecheck
      - name: Unit tests
        run: yarn test:unit
      - name: Hygiene gate
        run: yarn hygiene
