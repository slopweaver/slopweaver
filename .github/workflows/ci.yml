name: CI

on:
  push:
  # `edited`/`ready_for_review` included so the PR-format gate (which reads the PR BODY) re-runs when the
  # description changes — not only on a code push. Without them a body-only fix can't clear a red gate.
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - run: corepack enable
      - run: yarn install --immutable
      # One composite (`slopweaver dev lint`), the SAME `yarn lint` run locally: biome + prettier + oxlint +
      # eslint + knip + constraints + hygiene + door-coverage. Fails on any lint/format/dead-code/pin regression.
      - name: Lint
        run: yarn lint
      - name: Typecheck
        run: yarn typecheck
      - name: Unit tests
        run: yarn test:unit

  # The composed PR gate — hygiene + PR-format + eval-regression — via the SAME `yarn dev:gate` path used
  # locally. PR-only: it needs the PR body, and an unvalidated body is a failure, not a skip.
  dev-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - run: corepack enable
      - run: yarn install --immutable
      - name: Set state home
        # $RUNNER_TEMP is a step-context env var (the `runner.*` context is not available in job-level env).
        run: echo "SLOPWEAVER_HOME=$RUNNER_TEMP/slopweaver-home" >> "$GITHUB_ENV"
      - name: Init state home
        run: yarn slopweaver init
      - name: Dev gate
        env:
          # Passed as an env var (not shell-interpolated) so the body can't inject into the command.
          PR_BODY: ${{ github.event.pull_request.body }}
        run: yarn dev:gate
