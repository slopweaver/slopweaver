# Yarn 4 (Berry). node-modules linker, not PnP — maximum tooling compatibility (tsx, vitest, editors)
# with zero PnP shims. The Yarn version itself is pinned via `packageManager` in package.json, resolved
# by Corepack / proto — so the release binary is not vendored into the repo.
nodeLinker: node-modules
enableTelemetry: false

# This repo pins EXACT dependency versions (no ^/~ ranges). An empty range prefix makes `yarn add` pin by
# default, so a future add can't reintroduce a floating range.
defaultSemverRangePrefix: ""
